<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gras</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BASE */
body {
  background: #000;
  color: #d4ffd4;
  overflow-x: hidden;
  font-family: 'Orbitron', sans-serif;
}

/* 🌫️ FOG LAYERS */
.fog {
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,255,120,0.12) 0%, transparent 60%);
  animation: drift 25s infinite linear;
  z-index: -3;
  filter: blur(80px);
}

.fog2 {
  background: radial-gradient(circle, rgba(0,180,90,0.10) 0%, transparent 65%);
  animation-duration: 35s;
  animation-direction: reverse;
}

.fog3 {
  background: radial-gradient(circle, rgba(0,255,140,0.08) 0%, transparent 70%);
  animation-duration: 45s;
}

@keyframes drift {
  0% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(10%, 15%) rotate(180deg); }
  100% { transform: translate(-10%, -10%) rotate(360deg); }
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  padding: 15px;
  text-align: center;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav a {
  color: #00ff88;
  margin: 0 15px;
  text-decoration: none;
  font-size: 14px;
}

nav a:hover {
  color: #fff;
}

/* 🎤 HERO (NO IMAGE ANYMORE) */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero h1 {
  font-size: 4.5rem;
  color: #00ff88;
  letter-spacing: 6px;
  font-family: 'Cinzel', serif;
  text-transform: uppercase;
  z-index: 2;
  animation: glow 2.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #00ff88; }
  to { text-shadow: 0 0 25px #00ff88; }
}

/* 🌧️ RAIN CANVAS */
#rain {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* GLASS PANELS */
.section {
  padding: 100px 20px;
  text-align: center;
}

.glass {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0,255,136,0.2);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 40px;
  max-width: 900px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

/* EMBEDS */
.embed-container iframe {
  width: 100%;
  max-width: 600px;
  margin: 20px auto;
  border-radius: 12px;
  display: block;
}

/* SOCIAL */
.socials a {
  display: inline-block;
  margin: 10px;
  padding: 10px 20px;
  border: 1px solid #00ff88;
  color: #00ff88;
  text-decoration: none;
  transition: 0.3s;
}

.socials a:hover {
  background: #00ff88;
  color: black;
}

/* FOOTER */
footer {
  padding: 20px;
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
}

/* MOBILE */
@media(max-width: 768px) {
  .hero h1 {
    font-size: 2.5rem;
  }
}
</style>
</head>

<body>

<!-- 🌫️ FOG -->
<div class="fog"></div>
<div class="fog fog2"></div>
<div class="fog fog3"></div>

<nav>
  <a href="#music">Music</a>
  <a href="#contact">Contact</a>
</nav>

<!-- 🎤 HERO -->
<section class="hero">
  <canvas id="rain"></canvas>
  <h1>GRAS</h1>
</section>

<!-- 🎧 MUSIC -->
<section id="music" class="section">
  <div class="glass">

    <h2>Music</h2>

    <div class="embed-container">

      <iframe src="https://open.spotify.com/embed/track/17HMUZ2KCwEMXYOKUMVljp" height="152"></iframe>

      <iframe src="https://w.soundcloud.com/player/?url=https://soundcloud.com/user-684968783/lil-coop" height="166"></iframe>

      <iframe src="https://www.youtube.com/embed/YcSc3zSPhzc" height="315"></iframe>

    </div>

  </div>
</section>

<!-- 📲 CONTACT -->
<section id="contact" class="section">
  <div class="glass">

    <h2>Connect</h2>

    <div class="socials">
      <a href="https://www.instagram.com/gras_music/" target="_blank">Instagram</a>
      <a href="https://x.com/itsgraton" target="_blank">X</a>
      <a href="https://www.tiktok.com/@grasfalcon" target="_blank">TikTok</a>
    </div>

    <p style="margin-top:20px;">Contact: grasbizofficial@gmail.com</p>

  </div>
</section>

<footer>
  © 2026 Gras
</footer>

<script>
/* 🌧️ GREEN RAIN EFFECT */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let letters = "01GRAS01GRAS01";
letters = letters.split("");

const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for (let x = 0; x < columns; x++) {
  drops[x] = 1;
}

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}

setInterval(draw, 33);

/* RESIZE FIX */
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
