<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gras</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

/* BASE */
body{
  background:#050505;
  color:#ffd7b3;
  overflow-x:hidden;
  font-family:'Orbitron',sans-serif;
  position:relative;
}

/* FILM GRAIN */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    repeating-radial-gradient(circle at 0 0,
    rgba(255,255,255,0.03) 0,
    rgba(255,255,255,0.01) 1px,
    transparent 2px);
  opacity:0.08;
  pointer-events:none;
  z-index:9999;
  mix-blend-mode:soft-light;
}

/* 🌫️ FOG */
.fog{
  position:fixed;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle,
    rgba(255,120,40,0.13) 0%,
    transparent 60%);
  animation:drift 25s infinite linear;
  z-index:-3;
  filter:blur(90px);
}

.fog2{
  background:
    radial-gradient(circle,
    rgba(200,90,30,0.12) 0%,
    transparent 65%);
  animation-duration:35s;
  animation-direction:reverse;
}

.fog3{
  background:
    radial-gradient(circle,
    rgba(255,160,70,0.08) 0%,
    transparent 70%);
  animation-duration:45s;
}

@keyframes drift{
  0%{transform:translate(0,0) rotate(0deg);}
  50%{transform:translate(10%,15%) rotate(180deg);}
  100%{transform:translate(-10%,-10%) rotate(360deg);}
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  padding:15px;
  text-align:center;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(10px);
  z-index:1000;
  border-bottom:1px solid rgba(255,120,40,0.12);
}

nav a{
  color:#ff944d;
  margin:0 15px;
  text-decoration:none;
  font-size:14px;
  letter-spacing:2px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.hero h1{
  font-size:4.8rem;
  color:#ff944d;
  letter-spacing:8px;
  font-family:'Cinzel',serif;
}

.subtitle{
  margin-top:15px;
  color:#ffc08a;
  font-family:'Cinzel', serif;
}

/* CANVAS */
#rain{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
}

/* SECTIONS */
.section{
  padding:100px 20px;
  text-align:center;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,120,40,0.18);
  backdrop-filter:blur(12px);
  border-radius:24px;
  padding:40px;
  max-width:900px;
  margin:0 auto;
}

/* EMBEDS */
.embed-container iframe{
  width:100%;
  max-width:600px;
  margin:20px auto;
  border-radius:14px;
  display:block;
}

/* SOCIALS */
.socials a{
  display:inline-block;
  margin:10px;
  padding:12px 22px;
  border:1px solid #ff944d;
  color:#ff944d;
  text-decoration:none;
}

/* CURSOR */
.cursor-glow{
  position:fixed;
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,120,40,0.16), transparent 70%);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:999;
}

</style>
</head>

<body>

<div class="fog"></div>
<div class="fog fog2"></div>
<div class="fog fog3"></div>

<div class="cursor-glow"></div>

<nav>
  <a href="#music">Music</a>
  <a href="#contact">Contact</a>
</nav>

<section class="hero">
  <canvas id="rain"></canvas>

  <h1>GRAS</h1>
  <p class="subtitle"><i>claire</i> out now on all platforms</p>
</section>

<section id="music" class="section">

  <div class="glass">
    <h2>Music</h2>

    <div class="embed-container">

      <iframe
        src="https://open.spotify.com/embed/track/17HMUZ2KCwEMXYOKUMVljp"
        height="152">
      </iframe>

      <iframe
        src="https://w.soundcloud.com/player/?url=https://soundcloud.com/user-684968783/lil-coop"
        height="166">
      </iframe>

      <!-- FIXED YOUTUBE -->
      <iframe
        src="https://www.youtube.com/embed/b0G4BOwZyWY"
        height="315"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>

    </div>
  </div>

</section>

<section id="contact" class="section">
  <div class="glass">

    <h2>Connect</h2>

    <div class="socials">
      <a href="https://www.instagram.com/gras_music/" target="_blank">Instagram</a>
      <a href="https://x.com/itsgraton" target="_blank">X</a>
      <a href="https://www.tiktok.com/@grasfalcon" target="_blank">TikTok</a>
    </div>

    <p style="margin-top:25px;">
      Contact: grasbizofficial@gmail.com
    </p>

  </div>
</section>

<footer>
  © 2026 Gras
</footer>

<script>

/* CURSOR */
const glow = document.querySelector(".cursor-glow");

document.addEventListener("mousemove", e => {
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});

/* SIMPLE FLAME CANVAS */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function animate(){
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

</script>

</body>
</html>
