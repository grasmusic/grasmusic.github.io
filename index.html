<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gras</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  background: #000000;
  color: #d4ffd4;
  overflow-x: hidden;
  position: relative;
}

/* 🌫️ GREEN FOG BACKGROUND */
.fog {
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,255,120,0.12) 0%, transparent 60%);
  animation: drift 25s infinite linear;
  z-index: -1;
  filter: blur(80px);
}

.fog2 {
  background: radial-gradient(circle, rgba(0,180,90,0.10) 0%, transparent 65%);
  animation-duration: 35s;
  animation-direction: reverse;
}

.fog3 {
  background: radial-gradient(circle, rgba(0,255,140,0.08) 0%, transparent 70%);
  animation-duration: 45s;
}

@keyframes drift {
  0% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(10%, 15%) rotate(180deg); }
  100% { transform: translate(-10%, -10%) rotate(360deg); }
}

/* NAVBAR */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  padding: 15px;
  text-align: center;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav a {
  color: #00ff88;
  margin: 0 15px;
  text-decoration: none;
  font-size: 14px;
}

nav a:hover {
  color: #ffffff;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-size: 4rem;
  color: #00ff88;
  letter-spacing: 5px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #00ff88; }
  to { text-shadow: 0 0 25px #00ff88; }
}

/* SECTION */
.section {
  padding: 100px 20px;
  text-align: center;
  position: relative;
}

.section h2 {
  margin-bottom: 30px;
  color: #00ff88;
}

/* MUSIC EMBEDS */
.embed-container iframe {
  width: 80%;
  max-width: 600px;
  margin: 20px 0;
  border-radius: 12px;
}

/* SOCIAL */
.socials a {
  display: inline-block;
  margin: 10px;
  padding: 10px 20px;
  border: 1px solid #00ff88;
  color: #00ff88;
  text-decoration: none;
  transition: 0.3s;
}

.socials a:hover {
  background: #00ff88;
  color: black;
}

/* FOOTER */
footer {
  padding: 20px;
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
}

/* MOBILE */
@media(max-width: 768px) {
  .hero h1 {
    font-size: 2.5rem;
  }
}
</style>
</head>

<body>

<!-- 🌫️ FOG LAYERS -->
<div class="fog"></div>
<div class="fog fog2"></div>
<div class="fog fog3"></div>

<nav>
  <a href="#music">Music</a>
  <a href="#contact">Contact</a>
</nav>

<section class="hero">
  <h1>GRAS</h1>
</section>

<section id="music" class="section">
  <h2>Music</h2>

  <div class="embed-container">

    <!-- SPOTIFY -->
    <iframe 
      style="border-radius:12px"
      src="https://open.spotify.com/embed/track/17HMUZ2KCwEMXYOKUMVljp"
      width="100%" 
      height="152" 
      frameborder="0" 
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>

    <!-- SOUNDCLOUD -->
    <iframe 
      width="100%" 
      height="166" 
      scrolling="no" 
      frameborder="no" 
      allow="autoplay"
      src="https://w.soundcloud.com/player/?url=https://soundcloud.com/user-684968783/lil-coop">
    </iframe>

    <!-- YOUTUBE -->
    <iframe 
      width="100%" 
      height="315"
      src="https://www.youtube.com/embed/YcSc3zSPhzc"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>

  </div>
</section>

<section id="contact" class="section">
  <h2>Connect</h2>

  <div class="socials">
    <a href="https://www.instagram.com/gras_music/" target="_blank">Instagram</a>
    <a href="https://x.com/itsgraton" target="_blank">X</a>
    <a href="https://www.tiktok.com/@grasfalcon" target="_blank">TikTok</a>
  </div>

  <p style="margin-top:20px;">Contact: grasbizofficial@gmail.com</p>
</section>

<footer>
  © 2026 Gras
</footer>

</body>
</html>
